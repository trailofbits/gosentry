name: Repo knowledge

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  knowledge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check repo knowledge (AGENTS.md + docs)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          bash misc/gosentry/scripts/check_repo_knowledge.sh --base "${base}"
