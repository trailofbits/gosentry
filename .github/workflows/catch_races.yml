name: LibAFL catch-races

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  smoke-catch-races:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (bootstrap)
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Export GOROOT_BOOTSTRAP
        run: echo "GOROOT_BOOTSTRAP=$(go env GOROOT)" >> "$GITHUB_ENV"

      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Build gosentry toolchain
        run: cd src && ./make.bash

      - name: Smoke (--catch-races)
        run: bash misc/gosentry/tests/smoke_use_libafl_catch_races.sh
